<!DOCTYPE html>
<html>
<head>

<title>Cybersecurity Game</title>

<style>

body{
font-family:Arial;
background:#1c2541;
color:white;
text-align:center;
padding-top:80px;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Cybersecurity Quiz</h1>

<h2 id="player"></h2>

<h3 id="question"></h3>

<div id="answers"></div>

<h3>Score: <span id="score">0</span></h3>

<script type="module">

import { db } from "./firebase.js";

import {
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const username=localStorage.getItem("studentName")

document.getElementById("player").innerText="Player: "+username

let score=0
let level=1
let currentQuestion=0

const questions=[

{
q:"What does phishing attack try to steal?",
a:["Passwords","Hardware","WiFi signals"],
correct:0
},

{
q:"What protects a network from unauthorized access?",
a:["Firewall","Printer","Router cable"],
correct:0
},

{
q:"What makes a strong password?",
a:["123456","Long unique password","Your name"],
correct:1
}

]

function loadQuestion(){

const q=questions[currentQuestion]

document.getElementById("question").innerText=q.q

const answersDiv=document.getElementById("answers")

answersDiv.innerHTML=""

q.a.forEach((answer,index)=>{

const btn=document.createElement("button")

btn.innerText=answer

btn.onclick=()=>checkAnswer(index)

answersDiv.appendChild(btn)

})

}

function checkAnswer(index){

const q=questions[currentQuestion]

if(index===q.correct){

score+=10

}

document.getElementById("score").innerText=score

currentQuestion++

if(currentQuestion<questions.length){

loadQuestion()

}else{

level++

saveProgress()

alert("Game complete!")

}

}

async function saveProgress(){

await setDoc(doc(db,"students",username),{

name:username,
score:score,
level:level,
lastPlayed:new Date().toISOString()

})

}

loadQuestion()

</script>

</body>
</html>
