<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>
</head>

<body>

<h1>Student Dashboard</h1>

<button onclick="playLevel('level1')">Play Level 1</button>
<button onclick="playLevel('level2')">Play Level 2</button>

<p id="status"></p>

<script type="module">

import { auth, db } from "./firebase.js";

import {
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


function playLevel(level){

window.location="game.html?level="+level;

}

async function completeLevel(level){

const uid=auth.currentUser.uid;

await updateDoc(doc(db,"users",uid),{

["progress."+level]:true

});

document.getElementById("status").innerText=
"Completed "+level;

}

window.playLevel=playLevel;
window.completeLevel=completeLevel;

</script>

</body>
</html>
