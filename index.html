<!DOCTYPE html>
<html>
<head>

<title>Cybersecurity Training Login</title>

<style>

body{
font-family:Arial;
background:#0b132b;
color:white;
text-align:center;
padding-top:100px;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
cursor:pointer;
}

input{
padding:10px;
font-size:16px;
}

</style>

</head>

<body>

<h1>Cybersecurity Training Game</h1>

<h2>Select Your Name</h2>

<button onclick="login('Alice')">Alice</button>
<button onclick="login('Bob')">Bob</button>
<button onclick="login('Charlie')">Charlie</button>

<h3>Or Create Your Own</h3>

<input id="username" placeholder="Enter name">

<br><br>

<button onclick="createUser()">Start Game</button>

<script>

function login(name){

localStorage.setItem("studentName",name)

window.location.href="game.html"

}

function createUser(){

const name=document.getElementById("username").value

if(name===""){
alert("Enter a name")
return
}

localStorage.setItem("studentName",name)

window.location.href="game.html"

}

</script>

</body>
</html>
