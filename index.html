<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cybersecurity Network Defence Game</title>

<style>

body{
font-family:Arial;
background:#0a0f1f;
color:white;
text-align:center;
margin:0;
}

h1{
color:#00ffcc;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
margin:10px;
background:#00ffcc;
border:none;
border-radius:6px;
}

#loginScreen{
margin-top:80px;
}

select,input{
padding:10px;
font-size:16px;
margin:10px;
}

#dashboard{
display:flex;
justify-content:center;
gap:40px;
margin:10px;
font-size:18px;
}

#game{
display:flex;
justify-content:center;
gap:60px;
margin-top:20px;
}

.column{
width:450px;
}

.card{
background:#1b2a4a;
padding:12px;
margin:10px;
border-radius:6px;
cursor:grab;
}

.dropzone{
background:#111a30;
border:2px dashed #00ffcc;
padding:15px;
margin:10px;
border-radius:6px;
min-height:40px;
}

.correct{
background:#0f3d2e !important;
}

.wrong{
background:#5a1a1a !important;
}

#adminPanel{
display:none;
margin-top:40px;
}

table{
margin:auto;
border-collapse:collapse;
}

td,th{
border:1px solid white;
padding:8px 12px;
}

</style>
</head>

<body>

<h1>Cybersecurity Defence Dashboard</h1>

<!-- LOGIN SCREEN -->

<div id="loginScreen">

<h2>Select Your Name</h2>

<select id="studentName">
<option value="">Choose Student</option>
<option>Alice</option>
<option>Bob</option>
<option>Charlie</option>
</select>

<br>

<button onclick="studentLogin()">Start Game</button>

<hr style="width:300px">

<h3>Teacher Login</h3>

<input type="password" id="teacherPass" placeholder="Teacher Password">

<br>

<button onclick="teacherLogin()">Admin Login</button>

</div>


<!-- GAME AREA -->

<div id="gameArea" style="display:none">

<div id="dashboard">
<div>Student: <span id="playerName"></span></div>
<div>Level: <span id="level">1</span></div>
<div>Score: <span id="score">0</span></div>
<div>Timer: <span id="timer">120</span></div>
</div>

<button onclick="startGame()">PLAY</button>

<div id="game">

<div class="column">
<h2>Questions</h2>
<div id="vulnerabilities"></div>
</div>

<div class="column">
<h2>Answers</h2>
<div id="countermeasures"></div>
</div>

</div>

</div>


<!-- ADMIN PANEL -->

<div id="adminPanel">

<h2>Teacher Dashboard</h2>

<button onclick="loadResults()">View Student Progress</button>

<button onclick="clearResults()">Reset Results</button>

<div id="results"></div>

</div>


<audio id="correctSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8c0c2a9f8c.mp3"></audio>
<audio id="wrongSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_9c3c0c4c2b.mp3"></audio>

<script>

let currentStudent=""

function studentLogin(){

let name=document.getElementById("studentName").value

if(name===""){
alert("Please choose your name")
return
}

currentStudent=name

document.getElementById("playerName").innerText=name

document.getElementById("loginScreen").style.display="none"
document.getElementById("gameArea").style.display="block"

}

function teacherLogin(){

let pass=document.getElementById("teacherPass").value

if(pass==="teacher123"){

document.getElementById("loginScreen").style.display="none"
document.getElementById("adminPanel").style.display="block"

}else{

alert("Wrong password")

}

}

/* GAME VARIABLES */

let level=1
let score=0
let timer=120
let gameActive=false
let interval

let results={}
let totalQuestions=0
let correctAnswers=0


/* LEVEL DATA */

const level1={
"What is malware?":"Malicious software designed to damage or access systems",
"What is phishing?":"An attack to steal sensitive information",
"What is weak authentication?":"Security that is easy to bypass",
"What is SQL injection?":"An attack targeting databases"
}

const level2={
"What does HTTPS do?":"Protects data in transit",
"What is an IDS?":"System detecting suspicious activity",
"What is input validation?":"Checking user data for malicious input",
"What is MFA?":"Multiple verification methods"
}

const level3={
"What is encryption?":"Converting data into coded form",
"What is plaintext?":"Readable original data",
"What is ciphertext?":"Encrypted scrambled data",
"What is a public key?":"Key used to encrypt data"
}

function getCurrentLevelData(){

if(level===1) return level1
if(level===2) return level2
return level3

}

function startGame(){

document.getElementById("vulnerabilities").innerHTML=""
document.getElementById("countermeasures").innerHTML=""

results={}
correctAnswers=0

gameActive=true
timer=120

clearInterval(interval)

interval=setInterval(()=>{
timer--
document.getElementById("timer").innerText=timer

if(timer<=0){
gameActive=false
clearInterval(interval)
alert("Time over")
}

},1000)

loadGame()

}

function loadGame(){

let questions=getCurrentLevelData()

let vulnContainer=document.getElementById("vulnerabilities")
let counterContainer=document.getElementById("countermeasures")

let qList=Object.keys(questions).sort(()=>Math.random()-0.5)

qList.forEach(v=>{

let card=document.createElement("div")
card.className="card"
card.innerText=v
card.draggable=true
card.addEventListener("dragstart",dragStart)

vulnContainer.appendChild(card)

})

Object.values(questions).sort(()=>Math.random()-0.5).forEach(c=>{

let drop=document.createElement("div")
drop.className="dropzone"
drop.innerText=c

drop.addEventListener("dragover",e=>e.preventDefault())
drop.addEventListener("drop",dropCard)

counterContainer.appendChild(drop)

})

}

let dragged

function dragStart(e){
dragged=e.target
}

function dropCard(e){

if(!gameActive)return

let dropzone=e.target
let question=dragged.innerText
let answers=getCurrentLevelData()

if(dropzone.innerText===answers[question]){

dropzone.classList.add("correct")
dropzone.innerHTML+="<br>"+question

dragged.remove()

score+=10
correctAnswers++

document.getElementById("score").innerText=score
document.getElementById("correctSound").play()

}else{

dropzone.classList.add("wrong")

document.getElementById("wrongSound").play()

setTimeout(()=>{
dropzone.classList.remove("wrong")
},500)

}

checkLevel()

}

function checkLevel(){

let answers=getCurrentLevelData()
totalQuestions=Object.keys(answers).length

if(correctAnswers===totalQuestions){

saveProgress()

gameActive=false
clearInterval(interval)

level++

if(level>3){

alert("Game completed!")
return

}

document.getElementById("level").innerText=level

startGame()

}

}

/* SAVE STUDENT PROGRESS */

function saveProgress(){

let data=JSON.parse(localStorage.getItem("cyberGameResults") || "{}")

data[currentStudent]={
level:level,
score:score
}

localStorage.setItem("cyberGameResults",JSON.stringify(data))

}


/* ADMIN PANEL */

function loadResults(){

let data=JSON.parse(localStorage.getItem("cyberGameResults") || "{}")

let html="<table><tr><th>Student</th><th>Level</th><th>Score</th></tr>"

for(let student in data){

html+=`<tr>
<td>${student}</td>
<td>${data[student].level}</td>
<td>${data[student].score}</td>
</tr>`

}

html+="</table>"

document.getElementById("results").innerHTML=html

}

function clearResults(){

localStorage.removeItem("cyberGameResults")

alert("Results cleared")

}

</script>

</body>
</html>
